syntax = "proto3";

package storage;

service StorageService {
  // Administración
  rpc CreateDatabase (DbReq) returns (RecordResponse);
  rpc ListDatabases (EmptyReq) returns (ListRes);
  rpc DeleteDatabase (DbReq) returns (RecordResponse);
  rpc CreateTable (TableReq) returns (RecordResponse);
  rpc ListTables (DbReq) returns (ListRes);
  rpc DeleteTable (TableReq) returns (RecordResponse);

  // Operaciones CRUD
  rpc InsertRecord (InsertRequest) returns (RecordResponse);
  rpc FindRecords (SearchRequest) returns (SearchResponse);
  rpc UpdateRecords (UpdateRequest) returns (RecordResponse);
  rpc DeleteRecords (DeleteRequest) returns (RecordResponse);
}

message EmptyReq {}
message DbReq { string db_name = 1; }
message TableReq { string db_name = 1; string table_name = 2; }
message ListRes { bool success = 1; string message = 2; repeated string items = 3; }

message InsertRequest { string db_name = 1; string table_name = 2; string data_json = 3; }
message RecordResponse { bool success = 1; string message = 2; }
message SearchRequest { string db_name = 1; string table_name = 2; }
message SearchResponse { bool success = 1; string message = 2; string data_json = 3; }
message UpdateRequest { string db_name = 1; string table_name = 2; string condition_key = 3; string condition_value = 4; string new_data_json = 5; }
message DeleteRequest { string db_name = 1; string table_name = 2; string condition_key = 3; string condition_value = 4; }