syntax = "proto3";

package orquestador;

service ServicioOrquestador {
  rpc Login (PeticionLoginOrquestador) returns (RespuestaLoginOrquestador);
  rpc Registro (PeticionRegistroOrquestador) returns (RespuestaRegistroOrquestador);
  rpc EnviarComando (PeticionComandoOrquestador) returns (RespuestaComandoOrquestador);
}

message PeticionLoginOrquestador {
  string usuario = 1;
  string password = 2;
}

message RespuestaLoginOrquestador {
  bool exito = 1;
  string token = 2;
  string rol = 3;
  string mensaje = 4;
}

message PeticionRegistroOrquestador {
  string usuario = 1;
  string password = 2;
  string rol = 3;
  string creador = 4;
}

message RespuestaRegistroOrquestador {
  bool exito = 1;
  string mensaje = 2;
}

message PeticionComandoOrquestador {
  string token = 1;
  string tipo = 2; 
  string comando = 3;
}

message RespuestaComandoOrquestador {
  bool exito = 1;
  string mensaje = 2;
  string resultado = 3;
}